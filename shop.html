<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Shop</title></head>
<body>
<h1>Shop</h1>

<div>
<button onclick="setCat('Grow Systems')">Grow Systems</button>
<button onclick="setCat('Dab & Glass')">Dab & Glass</button>
<button onclick="setCat('Rolling & Smoking')">Rolling</button>
</div>

<select onchange="sortProducts(this.value)">
<option value="none">Sort</option>
<option value="low">Price Low</option>
<option value="high">Price High</option>
</select>

<div id="products"></div>

<script>
let products=[
{name:'Light',cat:'Grow Systems',price:100},
{name:'Rig',cat:'Dab & Glass',price:200},
{name:'Papers',cat:'Rolling & Smoking',price:5}
];

let current='Grow Systems';

function setCat(c){
current=c;
render();
}

function sortProducts(type){
if(type==='low') products.sort((a,b)=>a.price-b.price);
if(type==='high') products.sort((a,b)=>b.price-a.price);
render();
}

function render(){
document.getElementById('products').innerHTML=
products.filter(p=>p.cat===current)
.map(p=>p.name+' £'+p.price).join('<br>');
}

render();
</script>

</body></html>
